name: Tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  docs-and-scripts:
    name: Docs and scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize script permissions
        run: |
          chmod +x scripts/doctor.sh

      - name: Check required docs
        run: |
          test -f README.md
          test -f SECURITY.md
          test -f docs/linux-support.md
          test -f docs/electron-linux-architecture.md
          test -f docs/diagnostics.md
          test -f docs/security.md
          test -f docs/contributing.md

      - name: Check README links
        run: |
          grep -q "docs/linux-support.md" README.md
          grep -q "docs/diagnostics.md" README.md
          grep -q "docs/security.md" README.md
          grep -q "docs/contributing.md" README.md
          grep -q "docs/security.md" SECURITY.md

      - name: Check shell scripts parse
        run: |
          bash -n scripts/doctor.sh
          bash -n scripts/build-macos-app.sh
          bash -n scripts/run-tests.sh
          bash -n scripts/package-github-release.sh

      - name: Run doctor on Linux host
        run: |
          ./scripts/doctor.sh

      - name: Guard Linux roadmap language
        run: |
          grep -qi "Electron" README.md
          grep -qi "Electron" docs/linux-support.md
          grep -qi "Electron" docs/electron-linux-architecture.md
          grep -qi "TypeScript" docs/electron-linux-architecture.md
          grep -qi "React" docs/electron-linux-architecture.md
          grep -qi "Vite" docs/electron-linux-architecture.md
          grep -qi "Do not use Tauri" docs/electron-linux-architecture.md
          grep -qi "No Tauri" apps/linux-electron/README.md
          grep -qi "No Next.js inside the desktop shell" apps/linux-electron/README.md

  linux-electron:
    name: Linux Electron shell
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/linux-electron

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Linux Electron shell
        run: npm run build

  swift-tests:
    name: Swift tests
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize script permissions
        run: |
          chmod +x scripts/doctor.sh scripts/run-tests.sh

      - name: Show Swift version
        run: swift --version

      - name: Run doctor on macOS host
        run: ./scripts/doctor.sh

      - name: Run Swift tests
        run: ./scripts/run-tests.sh
